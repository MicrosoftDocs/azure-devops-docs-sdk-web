summary: Classification of a pipeline being rewired.
fullName: PipelineClassification
remarks: ''
isDeprecated: false
fields:
  - name: Unknown
    uid: azure-devops-extension-api.PipelineClassification.Unknown
    package: azure-devops-extension-api
    summary: Classification has not been determined yet.

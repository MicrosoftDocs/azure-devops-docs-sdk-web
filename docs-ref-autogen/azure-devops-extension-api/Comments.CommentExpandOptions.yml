### YamlMime:TSEnum
name: CommentExpandOptions
uid: azure-devops-extension-api.Comments.CommentExpandOptions
package: azure-devops-extension-api
summary: Specifies the additional data retrieval options for comments.
fullName: CommentExpandOptions
remarks: ''
isDeprecated: false
fields:
  - name: All
    uid: azure-devops-extension-api.Comments.CommentExpandOptions.All
    package: azure-devops-extension-api
    summary: >-
      Expand everything including Reactions, Mentions and also include
      RenderedText (HTML) for markdown comments
    numericValue: -17
  - name: None
    uid: azure-devops-extension-api.Comments.CommentExpandOptions.None
    package: azure-devops-extension-api
    summary: Include comments only, no mentions, reactions or rendered text
    numericValue: 0
  - name: Reactions
    uid: azure-devops-extension-api.Comments.CommentExpandOptions.Reactions
    package: azure-devops-extension-api
    summary: Include comment reactions
    numericValue: 1
  - name: RenderedText
    uid: azure-devops-extension-api.Comments.CommentExpandOptions.RenderedText
    package: azure-devops-extension-api
    summary: Include the rendered text (html) in addition to markdown text
    numericValue: 8
  - name: RenderedTextOnly
    uid: azure-devops-extension-api.Comments.CommentExpandOptions.RenderedTextOnly
    package: azure-devops-extension-api
    summary: >-
      If specified, then ONLY rendered text (html) will be returned, w/o
      markdown. Supposed to be used internally from data provides for
      optimization purposes.
    numericValue: 16
  - name: Children
    uid: azure-devops-extension-api.Comments.CommentExpandOptions.Children
    package: azure-devops-extension-api
    summary: If specified, then responses will be expanded in the results

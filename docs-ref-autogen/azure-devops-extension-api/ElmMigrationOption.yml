  - name: EnableAutoDiscoverPipelines
    uid: azure-devops-extension-api.ElmMigrationOption.EnableAutoDiscoverPipelines
    package: azure-devops-extension-api
    summary: >-
      When set, the sync job auto-discovers pipelines for the repository. When
      unset (default), the user must manually submit pipelines via the POST
      /pipelines API. Pipelines already in the config file are processed
      normally regardless.

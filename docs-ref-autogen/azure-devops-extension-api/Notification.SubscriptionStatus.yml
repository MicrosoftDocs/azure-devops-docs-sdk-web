### YamlMime:TSEnum
name: SubscriptionStatus
uid: azure-devops-extension-api.Notification.SubscriptionStatus
package: azure-devops-extension-api
summary: >-
  Subscription status values. A value greater than or equal to zero indicates
  the subscription is enabled. A negative value indicates the subscription is
  disabled.
fullName: SubscriptionStatus
remarks: ''
isDeprecated: false
fields:

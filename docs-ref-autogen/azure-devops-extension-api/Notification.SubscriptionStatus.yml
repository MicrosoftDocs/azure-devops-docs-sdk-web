    package: azure-devops-extension-api
    summary: >-
      Subscription is disabled because it generated a high volume of
      notifications.
    numericValue: -200
  - name: PendingDeletion
    uid: azure-devops-extension-api.Notification.SubscriptionStatus.PendingDeletion
    package: azure-devops-extension-api
    summary: Subscription is disabled and will be deleted.
    numericValue: -100
  - name: DisabledArgumentException
    uid: >-
      azure-devops-extension-api.Notification.SubscriptionStatus.DisabledArgumentException

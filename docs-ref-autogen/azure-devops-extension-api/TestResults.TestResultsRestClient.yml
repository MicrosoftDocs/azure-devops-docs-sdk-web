    uid: azure-devops-extension-api.TestResults.TestResultsRestClient.queryTestRuns
    package: azure-devops-extension-api
    summary: >-
      Query Test Runs based on filters. Mandatory fields are minLastUpdatedDate
      and maxLastUpdatedDate.
    remarks: ''
    isDeprecated: false
    syntax:
      content: >-
        function queryTestRuns(project: string, minLastUpdatedDate: Date,
        maxLastUpdatedDate: Date, state?: TestRunState, planIds?: number[],
        isAutomated?: boolean, publishContext?: TestRunPublishContext,
        buildIds?: number[], buildDefIds?: number[], branchName?: string,
        releaseIds?: number[], releaseDefIds?: number[], releaseEnvIds?:
        number[], releaseEnvDefIds?: number[], runTitle?: string, top?: number,
        sortOrder?: TestRunSortOrderType, continuationToken?: string):
        Promise<PagedList<TestRun>>
      parameters:
        - id: project
          type: string
          description: Project ID or project name
        - id: minLastUpdatedDate
          type: Date
          description: Minimum Last Modified Date of run to be queried (Mandatory).
        - id: maxLastUpdatedDate
          type: Date
          description: >-
            Maximum Last Modified Date of run to be queried (Mandatory,
            difference between min and max date can be atmost 7 days).
        - id: state
          type: <xref uid="azure-devops-extension-api.Test.TestRunState" />
          description: Current state of the Runs to be queried.
        - id: planIds
          type: number[]
          description: >-
            Plan Ids of the Runs to be queried, comma separated list of valid
            ids.
        - id: isAutomated
          type: boolean
          description: Automation type of the Runs to be queried.
        - id: publishContext
          type: <xref uid="azure-devops-extension-api.Test.TestRunPublishContext" />
          description: PublishContext of the Runs to be queried.
        - id: buildIds
          type: number[]
          description: >-
            Build Ids of the Runs to be queried, comma separated list of valid
            ids.
        - id: buildDefIds
          type: number[]
          description: >-
            Build Definition Ids of the Runs to be queried, comma separated list
            of valid ids.
        - id: branchName
          type: string
          description: Source Branch name of the Runs to be queried.
        - id: releaseIds
          type: number[]
          description: >-
            Release Ids of the Runs to be queried, comma separated list of valid
            ids.
        - id: releaseDefIds
          type: number[]
          description: >-
            Release Definition Ids of the Runs to be queried, comma separated
            list of valid ids.
        - id: releaseEnvIds
          type: number[]
          description: >-
            Release Environment Ids of the Runs to be queried, comma separated
            list of valid ids.
        - id: releaseEnvDefIds
          type: number[]
          description: >-
            Release Environment Definition Ids of the Runs to be queried, comma
            separated list of valid ids.
        - id: runTitle
          type: string
          description: Run Title of the Runs to be queried.
        - id: top
          type: number
          description: Number of runs to be queried. Limit is 100
        - id: sortOrder
          type: <xref uid="azure-devops-extension-api.Test.TestRunSortOrderType" />
          description: Sort order by LastUpdated for the test runs.
        - id: continuationToken
          type: string
          description: >-
            continuationToken received from previous batch or null for first
            batch. It is not supposed to be created (or altered, if received
            from last batch) by user.
      return:
        description: ''
        type: >-
          Promise&lt;<xref uid="azure-devops-extension-api.WebApi.PagedList"
          />&lt;<xref uid="azure-devops-extension-api.Test.TestRun" />&gt;&gt;

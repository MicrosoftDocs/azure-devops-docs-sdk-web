### YamlMime:TSEnum
name: RepositoryCleanOptions
uid: azure-devops-extension-api.Build.RepositoryCleanOptions
package: azure-devops-extension-api
summary: ''
fullName: RepositoryCleanOptions
remarks: ''
isDeprecated: false
fields:
  - name: Source
    uid: azure-devops-extension-api.Build.RepositoryCleanOptions.Source
    package: azure-devops-extension-api
    summary: >-
      Run git clean -fdx && git reset --hard or Tf /scorch on
      $(build.sourcesDirectory)
    numericValue: 0
  - name: SourceAndOutputDir
    uid: azure-devops-extension-api.Build.RepositoryCleanOptions.SourceAndOutputDir
    package: azure-devops-extension-api
    summary: >-
      Run git clean -fdx && git reset --hard or Tf /scorch on
      $(build.sourcesDirectory), also re-create $(build.binariesDirectory)
    numericValue: 1
  - name: SourceDir
    uid: azure-devops-extension-api.Build.RepositoryCleanOptions.SourceDir
    package: azure-devops-extension-api
    summary: Re-create $(build.sourcesDirectory)
    numericValue: 2
  - name: AllBuildDir
    uid: azure-devops-extension-api.Build.RepositoryCleanOptions.AllBuildDir
    package: azure-devops-extension-api
    summary: >-
      Re-create $(agnet.buildDirectory) which contains
      $(build.sourcesDirectory), $(build.binariesDirectory) and any folders that
      left from previous build.
    numericValue: 3

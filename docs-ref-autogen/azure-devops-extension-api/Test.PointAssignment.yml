### YamlMime:TSType
name: PointAssignment
uid: azure-devops-extension-api.Test.PointAssignment
package: azure-devops-extension-api
summary: >-
  Adding test cases to a suite creates one of more test points based on the
  default configurations and testers assigned to the test suite. PointAssignment
  is the list of test points that were created for each of the test cases that
  were added to the test suite.
fullName: PointAssignment
remarks: ''
isDeprecated: false
type: interface
properties:
  - name: configuration
    uid: azure-devops-extension-api.Test.PointAssignment.configuration
    package: azure-devops-extension-api
    summary: Configuration that was assigned to the test case.
    fullName: configuration
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'configuration: ShallowReference'
      return:
        description: ''
        type: <xref uid="azure-devops-extension-api.Test.ShallowReference" />
  - name: tester
    uid: azure-devops-extension-api.Test.PointAssignment.tester
    package: azure-devops-extension-api
    summary: Tester that was assigned to the test case
    fullName: tester
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'tester: IdentityRef'
      return:
        description: ''
        type: <xref uid="azure-devops-extension-api.WebApi.IdentityRef" />

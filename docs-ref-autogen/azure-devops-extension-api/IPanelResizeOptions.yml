### YamlMime:TSType
name: IPanelResizeOptions
uid: azure-devops-extension-api.IPanelResizeOptions
package: azure-devops-extension-api
summary: >-
  Options for controlling the horizontal width and resizing behavior of the
  panel.


  Note: Resizing is automatically disabled on small screens (xsmall breakpoint)

  where the panel renders in fullscreen mode. The resize handle is not shown

  and any user-set width is ignored in that layout.
fullName: IPanelResizeOptions
remarks: ''
isDeprecated: false
type: interface
properties:
  - name: maxWidth
    uid: azure-devops-extension-api.IPanelResizeOptions.maxWidth
    package: azure-devops-extension-api
    summary: |-
      The maximum width in pixels the panel can be resized to.
      Only applies when userResizable is true.
    fullName: maxWidth
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'maxWidth?: number'
      return:
        description: ''
        type: number
  - name: minWidth
    uid: azure-devops-extension-api.IPanelResizeOptions.minWidth
    package: azure-devops-extension-api
    summary: |-
      The minimum width in pixels the panel can be resized to.
      Only applies when userResizable is true.
    fullName: minWidth
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'minWidth?: number'
      return:
        description: ''
        type: number
  - name: onWidthChanged
    uid: azure-devops-extension-api.IPanelResizeOptions.onWidthChanged
    package: azure-devops-extension-api
    summary: Callback fired when the panel width changes due to user interaction.
    fullName: onWidthChanged
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'onWidthChanged?: (width: number) => void'
      return:
        description: ''
        type: '(width: number) =&gt; void'
  - name: userResizable
    uid: azure-devops-extension-api.IPanelResizeOptions.userResizable
    package: azure-devops-extension-api
    summary: |-
      Whether the user can interactively resize the panel width by dragging the
      resize handle or using keyboard arrow keys. When false, the panel width
      is locked to the size determined by the size prop.

      The resize handle is not rendered on small screens where the panel is
      displayed fullscreen.
    fullName: userResizable
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'userResizable?: boolean'
      return:
        description: ''
        type: boolean

### YamlMime:TSType
name: PipelineDebuggerResponse
uid: azure-devops-extension-api.PipelineDebuggerResponse
package: azure-devops-extension-api
summary: Response DTO returned by the pipeline debugger POST endpoint.
fullName: PipelineDebuggerResponse
remarks: ''
isDeprecated: false
type: interface
properties:
  - name: analysisResult
    uid: azure-devops-extension-api.PipelineDebuggerResponse.analysisResult
    package: azure-devops-extension-api
    summary: >-
      When the analysis has already completed for this build, contains the
      cached result so the caller does not need a separate GET request. Null
      when the job is newly queued or still in progress.
    fullName: analysisResult
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'analysisResult: PipelineDebuggerAnalysisOutput'
      return:
        description: ''
        type: >-
          <xref uid="azure-devops-extension-api.PipelineDebuggerAnalysisOutput"
          />
  - name: authUrl
    uid: azure-devops-extension-api.PipelineDebuggerResponse.authUrl
    package: azure-devops-extension-api
    summary: GitHub OAuth authorization URL. Present only when NeedsAuth is true.
    fullName: authUrl
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'authUrl: string'
      return:
        description: ''
        type: string
  - name: message
    uid: azure-devops-extension-api.PipelineDebuggerResponse.message
    package: azure-devops-extension-api
    summary: >-
      Human-readable status message (e.g. "queued successfully", "already
      running", or "Analysis already completed").
    fullName: message
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'message: string'
      return:
        description: ''
        type: string
  - name: needsAuth
    uid: azure-devops-extension-api.PipelineDebuggerResponse.needsAuth
    package: azure-devops-extension-api
    summary: >-
      True when the user needs to authorize the GitHub Copilot app before
      analysis can proceed. The client should open a popup to AuthUrl and retry
      after authorization completes.
    fullName: needsAuth
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'needsAuth: boolean'
      return:
        description: ''
        type: boolean

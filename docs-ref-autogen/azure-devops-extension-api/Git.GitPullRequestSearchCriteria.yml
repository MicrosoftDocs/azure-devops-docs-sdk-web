    isDeprecated: false
    syntax:
      content: 'targetRefName: string'
      return:
        description: ''
        type: string
  - name: title
    uid: azure-devops-extension-api.Git.GitPullRequestSearchCriteria.title
    package: azure-devops-extension-api
    summary: >-

    uid: azure-devops-extension-api.Git.GitPullRequestSearchCriteria.labels
    package: azure-devops-extension-api
    summary: >-
      If set, filters pull requests that have labels matching the specified
      label names.
    fullName: labels
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'labels: string[]'
      return:
        description: ''
        type: string[]

    uid: azure-devops-extension-api.Git.GitPullRequestSearchCriteria.minTime
    package: azure-devops-extension-api
    summary: >-
      If specified, filters pull requests that created/closed after this date
      based on the queryTimeRangeType specified.
    fullName: minTime
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'minTime: Date'
      return:
        description: ''
        type: Date

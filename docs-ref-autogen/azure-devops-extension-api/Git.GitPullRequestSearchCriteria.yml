    fullName: creatorId
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'creatorId: string'
      return:
        description: ''
        type: string
  - name: includeLinks
    uid: azure-devops-extension-api.Git.GitPullRequestSearchCriteria.includeLinks
    package: azure-devops-extension-api
    summary: Whether to include the _links field on the shallow references
    fullName: includeLinks
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'includeLinks: boolean'
      return:
        description: ''
        type: boolean

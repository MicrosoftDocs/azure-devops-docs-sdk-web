    remarks: ''
    isDeprecated: false
    syntax:
      content: 'reviewerId: string'
      return:
        description: ''
        type: string
  - name: sourceRefName
    uid: azure-devops-extension-api.Git.GitPullRequestSearchCriteria.sourceRefName
    package: azure-devops-extension-api
    summary: If set, search for pull requests from this branch.
    fullName: sourceRefName
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'sourceRefName: string'
      return:
        description: ''
        type: string
  - name: sourceRepositoryId
    uid: >-
      azure-devops-extension-api.Git.GitPullRequestSearchCriteria.sourceRepositoryId
    package: azure-devops-extension-api
    summary: >-
      If set, search for pull requests whose source branch is in this
      repository.
    fullName: sourceRepositoryId
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'sourceRepositoryId: string'
      return:
        description: ''
        type: string
  - name: status
    uid: azure-devops-extension-api.Git.GitPullRequestSearchCriteria.status
    package: azure-devops-extension-api
    summary: >-
      If set, search for pull requests that are in this state. Defaults to

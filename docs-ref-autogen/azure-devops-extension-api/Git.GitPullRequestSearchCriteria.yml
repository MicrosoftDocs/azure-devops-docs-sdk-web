    fullName: status
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'status: PullRequestStatus'
      return:
        description: ''
        type: <xref uid="azure-devops-extension-api.Git.PullRequestStatus" />
  - name: tagsFilterOperator
    uid: >-
      azure-devops-extension-api.Git.GitPullRequestSearchCriteria.tagsFilterOperator
    package: azure-devops-extension-api
    summary: >-
      The operator used for filtering by labels. Defaults to And if unset. When
